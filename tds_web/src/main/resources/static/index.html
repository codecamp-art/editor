<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TDS Client Query</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="top-bar">
      <h1>TDS Client Query</h1>
      <button id="copyButton" class="icon-button" type="button" disabled title="Copy">
        <span aria-hidden="true">Copy</span>
      </button>
    </header>

    <section class="query-band" aria-label="Client query">
      <form id="searchForm" class="search-form">
        <label for="clientQuery">Client</label>
        <div class="search-controls">
          <input id="clientQuery" name="clientQuery" autocomplete="off" placeholder="ID or name">
          <button type="submit">Search</button>
        </div>
      </form>
      <div id="status" class="status" role="status" aria-live="polite"></div>
    </section>

    <section id="candidateSection" class="candidate-band" aria-label="Client candidates" hidden>
      <div id="candidateList" class="candidate-list"></div>
    </section>

    <section class="result-band" aria-label="Client result">
      <table id="resultTable" class="result-table" hidden>
        <tbody id="resultBody"></tbody>
      </table>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
