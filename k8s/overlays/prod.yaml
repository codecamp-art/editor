apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: my-app-prod

resources:
  - ../../base

patches:
  - target:
      kind: CronJob
      name: tgt-refresh
    patch: |-
      - op: replace
        path: /spec/schedule
        value: "0 */6 * * *"
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/containers/0/image
        value: my-registry.example.com/security/kerberos-refresh:1.0.0