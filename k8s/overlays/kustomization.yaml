apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: my-app-dev

resources:
  - ../../base

patches:
  - target:
      kind: CronJob
      name: tgt-refresh
    patch: |-
      - op: replace
        path: /spec/schedule
        value: "*/15 * * * *"
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/containers/0/image
        value: my-registry.example.com/security/kerberos-refresh:dev
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/containers/0/command/2
        value: |
          kinit -R || kinit -kt /etc/security/keytabs/app.keytab appuser-dev@EXAMPLE.COM
          klist