env.name=dev
tds.drtp_host=127.0.0.1
tds.drtp_port=6003
tds.user=${TDS_USER:10000}
tds.password=${TDS_PASSWORD:}
tds.req_timeout_ms=300000
tds.log_level=2000
tds.klg_enable=false
tds.function_no=20100

smtp.host=${SMTP_HOST:mta-hub.REPLACE_ME.com.cn}
smtp.port=${SMTP_PORT:2587}
smtp.username=${SMTP_USERNAME:}
smtp.password=${SMTP_PASSWORD:}
smtp.from=${SMTP_FROM:tds-reporter@example.com}
smtp.security=${SMTP_SECURITY:starttls}
smtp.client_cert_path=${SMTP_CLIENT_CERT:/app/.cert/server.pem}
smtp.client_key_path=${SMTP_CLIENT_KEY:/app/.cert/server.key}
smtp.client_cert_type=${SMTP_CLIENT_CERT_TYPE:PEM}
smtp.client_key_type=${SMTP_CLIENT_KEY_TYPE:PEM}
smtp.client_key_password=${SMTP_CLIENT_KEY_PASSWORD:}
smtp.insecure=${SMTP_INSECURE:false}
smtp.connect_timeout_seconds=15

email.default_to=${EMAIL_TO:dev-ops@example.com}
email.default_cc=${EMAIL_CC:}
email.subject=${EMAIL_SUBJECT:TDS Client Funding and Risk Ratio Report}
report.output_dir=${REPORT_OUTPUT_DIR:../output}
report.attachment_name=${REPORT_ATTACHMENT_NAME:tds_customer_funds}
log.dir=${LOG_DIR:../logs}
log.level=${LOG_LEVEL:info}
